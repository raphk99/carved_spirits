<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Globe Test - Three.js</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000000;
      color: #ffffff;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    #info h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    #info p {
      font-size: 14px;
      color: #aaa;
      line-height: 1.6;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      z-index: 5;
    }

    .hidden {
      display: none;
    }

    #event-overlay {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 100;
      max-width: 300px;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    #event-overlay.visible {
      opacity: 1;
    }

    #event-overlay img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    #event-overlay h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
    }

    #event-overlay p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: #cccccc;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="info">
    <h1>Earth Globe 2050</h1>
    <p>Drag to rotate • Scroll to zoom<br>
    Country outlines displayed<br>
    Inspired by 2050.earth</p>
  </div>

  <div id="loading">Loading Earth...</div>

  <div id="event-overlay">
    <img id="overlay-image" src="" alt="">
    <h3 id="overlay-label"></h3>
    <p id="overlay-description"></p>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    // Camera setup
    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 3;

    // Renderer setup
    const renderer = new THREE.WebGLRenderer({ 
      antialias: true,
      alpha: true 
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 1.5;
    controls.maxDistance = 5;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enablePan = false;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    const backLight = new THREE.DirectionalLight(0x4488ff, 0.3);
    backLight.position.set(-5, -3, -5);
    scene.add(backLight);

    // Texture loader
    const textureLoader = new THREE.TextureLoader();
    const loadingEl = document.getElementById('loading');

    // Create globe group
    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Load textures
    let texturesLoaded = 0;
    const totalTextures = 2; // Earth base + combined contours

    function checkLoading() {
      texturesLoaded++;
      if (texturesLoaded >= totalTextures) {
        loadingEl.classList.add('hidden');
      }
    }

    // Main Earth sphere with higher resolution
    const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
    
    textureLoader.load(
      './assets/earth/earth_1.png',
      (texture) => {
        // Enable anisotropic filtering for better quality
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        
        const earthMaterial = new THREE.MeshPhongMaterial({
          map: texture,
          shininess: 10,
          specular: new THREE.Color(0x222222),
          emissive: new THREE.Color(0x000000),
          emissiveIntensity: 0
        });
        
        const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
        globeGroup.add(earthMesh);
        checkLoading();
      },
      undefined,
      (error) => {
        console.error('Error loading earth texture:', error);
        // Create fallback material
        const fallbackMaterial = new THREE.MeshPhongMaterial({
          color: 0x1a1a2e,
          shininess: 10
        });
        const earthMesh = new THREE.Mesh(earthGeometry, fallbackMaterial);
        globeGroup.add(earthMesh);
        checkLoading();
      }
    );

    // Combine the two contour halves into one complete texture
    function combineContourTextures() {
      const img1 = new Image();
      const img2 = new Image();
      let loaded = 0;

      img1.crossOrigin = 'anonymous';
      img2.crossOrigin = 'anonymous';

      function onLoad() {
        loaded++;
        if (loaded === 2) {
          // Create canvas to combine both images
          const canvas = document.createElement('canvas');
          // Assuming both images are square and need to be placed side by side
          // For equirectangular projection: width should be 2x height
          canvas.width = img1.width * 2;
          canvas.height = img1.height;
          
          const ctx = canvas.getContext('2d');
          
          // Clear canvas with transparent background
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          // Draw first half (left side)
          ctx.drawImage(img1, 0, 0, img1.width, img1.height);
          
          // Draw second half (right side)
          ctx.drawImage(img2, img1.width, 0, img2.width, img2.height);
          
          // Create texture from combined canvas
          const combinedTexture = new THREE.CanvasTexture(canvas);
          combinedTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
          combinedTexture.needsUpdate = true;
          
          // Create contour overlay slightly larger than Earth
          const contourGeometry = new THREE.SphereGeometry(1.003, 128, 128);
          const contourMaterial = new THREE.MeshBasicMaterial({
            map: combinedTexture,
            transparent: true,
            opacity: 1.0,
            blending: THREE.NormalBlending,
            depthWrite: false,
            side: THREE.DoubleSide
          });
          
          const contourMesh = new THREE.Mesh(contourGeometry, contourMaterial);
          globeGroup.add(contourMesh);
          checkLoading();
        }
      }

      img1.onload = onLoad;
      img2.onload = onLoad;
      
      img1.onerror = () => {
        console.error('Error loading contour1_1.png');
        checkLoading();
      };
      img2.onerror = () => {
        console.error('Error loading contour2_1.png');
        checkLoading();
      };

      img1.src = './assets/earth/contour1_1.png';
      img2.src = './assets/earth/contour2_1.png';
    }

    // Start combining contour textures
    combineContourTextures();

    // Atmosphere glow effect
    const atmosphereGeometry = new THREE.SphereGeometry(1.15, 64, 64);
    const atmosphereMaterial = new THREE.ShaderMaterial({
      vertexShader: `
        varying vec3 vNormal;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        void main() {
          float intensity = pow(0.6 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
          gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
        }
      `,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      transparent: true
    });

    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    globeGroup.add(atmosphere);

    // Event Points System
    const eventPoints = [];
    const eventMarkers = [];
    
    // Sample event data - you can modify this or load from external source
    const eventsData = [
      {
        label: "Ancient Temple Discovery",
        type: "archaeological",
        coordinates: { lat: 40.7128, lon: -74.0060 }, // New York
        image: "./assets/earth/bg.jpg",
        description: "A remarkable temple from 3000 BCE discovered beneath the city.",
        clickable: true,
        date: "2024-01"
      },
      {
        label: "Sacred Mountain Site",
        type: "spiritual",
        coordinates: { lat: 51.5074, lon: -0.1278 }, // London
        image: "./assets/earth/clouds.jpg",
        description: "Ancient meditation site used by monks for centuries.",
        clickable: true,
        date: "2024-02"
      },
      {
        label: "Historical Monument",
        type: "cultural",
        coordinates: { lat: 35.6762, lon: 139.6503 }, // Tokyo
        image: "./assets/earth/bg.jpg",
        description: "Important cultural heritage site from the Edo period.",
        clickable: true,
        date: "2024-03"
      },
      {
        label: "Ancient Ruins",
        type: "archaeological",
        coordinates: { lat: -33.8688, lon: 151.2093 }, // Sydney
        image: "./assets/earth/clouds.jpg",
        description: "Recently excavated ruins revealing ancient civilization.",
        clickable: true,
        date: "2024-04"
      }
    ];

    // Convert lat/lon to 3D position on sphere
    function latLonToVector3(lat, lon, radius = 1) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      
      const x = -(radius * Math.sin(phi) * Math.cos(theta));
      const z = radius * Math.sin(phi) * Math.sin(theta);
      const y = radius * Math.cos(phi);
      
      return new THREE.Vector3(x, y, z);
    }

    // Create event point with dot and light ray
    function createEventPoint(eventData) {
      const group = new THREE.Group();
      const position = latLonToVector3(
        eventData.coordinates.lat, 
        eventData.coordinates.lon, 
        1.01
      );
      
      // Get surface normal for orientation
      const normal = position.clone().normalize();
      
      // Create dot marker
      const dotTexture = textureLoader.load('./assets/earth/dot.png');
      const dotGeometry = new THREE.PlaneGeometry(0.03, 0.03);
      const dotMaterial = new THREE.MeshBasicMaterial({
        map: dotTexture,
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      
      const dotMesh = new THREE.Mesh(dotGeometry, dotMaterial);
      dotMesh.position.copy(position);
      dotMesh.lookAt(position.clone().multiplyScalar(2));
      group.add(dotMesh);
      
      // Create light ray with additive blending
      const lightrayTexture = textureLoader.load('./assets/earth/lightray.jpg');
      const lightrayGeometry = new THREE.PlaneGeometry(0.15, 0.3);
      const lightrayMaterial = new THREE.MeshBasicMaterial({
        map: lightrayTexture,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
        opacity: 0.8
      });
      
      const lightrayMesh = new THREE.Mesh(lightrayGeometry, lightrayMaterial);
      
      // Position lightray offset from surface (center of the ray extending outward)
      const offset = normal.clone().multiplyScalar(0.15);
      lightrayMesh.position.copy(position.clone().add(offset));
      
      // Orient lightray radially - the plane should stand perpendicular to the surface
      // We want the plane to be vertical relative to the sphere surface
      // quaternion.setFromUnitVectors aligns one vector to another
      const up = new THREE.Vector3(0, 1, 0); // default "up" of the plane
      const quaternion = new THREE.Quaternion();
      quaternion.setFromUnitVectors(up, normal);
      lightrayMesh.quaternion.copy(quaternion);
      
      group.add(lightrayMesh);
      
      // Store reference to event data and normal for animation
      group.userData = {
        eventData: eventData,
        dotMesh: dotMesh,
        lightrayMesh: lightrayMesh,
        normal: normal.clone() // Store the normal for rotation animation
      };
      
      globeGroup.add(group);
      eventMarkers.push(group);
      
      return group;
    }

    // Create all event points
    eventsData.forEach(eventData => {
      createEventPoint(eventData);
    });

    // Raycaster for hover detection
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredEvent = null;

    // Get overlay elements
    const overlay = document.getElementById('event-overlay');
    const overlayImage = document.getElementById('overlay-image');
    const overlayLabel = document.getElementById('overlay-label');
    const overlayDescription = document.getElementById('overlay-description');

    // Mouse move handler for hover detection
    function onMouseMove(event) {
      // Calculate mouse position in normalized device coordinates
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      // Update raycaster
      raycaster.setFromCamera(mouse, camera);
      
      // Check for intersections with event markers
      const intersects = raycaster.intersectObjects(
        eventMarkers.map(marker => marker.userData.dotMesh),
        false
      );
      
      if (intersects.length > 0) {
        const intersectedMarker = eventMarkers.find(
          marker => marker.userData.dotMesh === intersects[0].object
        );
        
        if (intersectedMarker && intersectedMarker.userData.eventData.clickable) {
          if (hoveredEvent !== intersectedMarker) {
            hoveredEvent = intersectedMarker;
            showOverlay(intersectedMarker.userData.eventData, event.clientX, event.clientY);
            document.body.style.cursor = 'pointer';
          } else {
            // Update overlay position as mouse moves
            updateOverlayPosition(event.clientX, event.clientY);
          }
        }
      } else {
        if (hoveredEvent) {
          hideOverlay();
          hoveredEvent = null;
          document.body.style.cursor = 'default';
        }
      }
    }

    // Show overlay with event data
    function showOverlay(eventData, x, y) {
      overlayImage.src = eventData.image;
      overlayLabel.textContent = eventData.label;
      overlayDescription.textContent = eventData.description;
      
      updateOverlayPosition(x, y);
      overlay.classList.add('visible');
    }

    // Update overlay position
    function updateOverlayPosition(x, y) {
      const offsetX = 20;
      const offsetY = 20;
      
      // Check if overlay would go off screen
      const overlayRect = overlay.getBoundingClientRect();
      let finalX = x + offsetX;
      let finalY = y + offsetY;
      
      // Adjust if going off right edge
      if (finalX + overlayRect.width > window.innerWidth) {
        finalX = x - overlayRect.width - offsetX;
      }
      
      // Adjust if going off bottom edge
      if (finalY + overlayRect.height > window.innerHeight) {
        finalY = y - overlayRect.height - offsetY;
      }
      
      overlay.style.left = finalX + 'px';
      overlay.style.top = finalY + 'px';
    }

    // Hide overlay
    function hideOverlay() {
      overlay.classList.remove('visible');
    }

    // Add mouse move listener
    window.addEventListener('mousemove', onMouseMove);

    // Animate light rays (rotation around radial axis + pulsing effect)
    function animateLightrays() {
      const time = Date.now() * 0.001;
      eventMarkers.forEach((marker, index) => {
        const lightray = marker.userData.lightrayMesh;
        const normal = marker.userData.normal;
        
        if (lightray && normal) {
          const rotationSpeed = 2222.0; // Rotation speed in radians per second
          const angle = time * rotationSpeed + index * Math.PI / 2; // Offset each ray
          
          // The lightray is positioned radially, we want it to spin around that radial axis
          // like a propeller blade rotating around its central axis
          
          // First, orient the plane radially (Y-axis along normal)
          const up = new THREE.Vector3(0, -1, 0);
          const baseQuaternion = new THREE.Quaternion();
          baseQuaternion.setFromUnitVectors(up, normal);
          
          // Then create a rotation around the radial axis (normal)
          const rotationQuaternion = new THREE.Quaternion();
          rotationQuaternion.setFromAxisAngle(normal, angle);
          
          // Apply: first the base orientation, then rotate around the normal
          lightray.quaternion.copy(baseQuaternion).premultiply(rotationQuaternion);
          
          // Subtle pulsing effect on opacity
          lightray.material.opacity = 0.6 + Math.sin(time * 2 + index) * 0.2;
        }
      });
    }

    // Stars background
    const starsGeometry = new THREE.BufferGeometry();
    const starsMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.7,
      sizeAttenuation: true
    });

    const starsVertices = [];
    for (let i = 0; i < 10000; i++) {
      const x = (Math.random() - 0.5) * 2000;
      const y = (Math.random() - 0.5) * 2000;
      const z = (Math.random() - 0.5) * 2000;
      starsVertices.push(x, y, z);
    }

    starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // Animation
    function animate() {
      requestAnimationFrame(animate);
      
      // Rotate globe slowly
      globeGroup.rotation.y += 0.001;
      
      // Animate light rays
      animateLightrays();
      
      // Update controls
      controls.update();
      
      // Render
      renderer.render(scene, camera);
    }

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start animation
    animate();
  </script>
</body>
</html>
