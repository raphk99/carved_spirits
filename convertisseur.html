<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Convertisseur DMS → Radians</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }
    .box {
      background: white;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      border-radius: 8px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    .result {
      margin-top: 15px;
      background: #eef;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>DMS → Radians</h2>

  <input
    type="text"
    id="coord"
    placeholder="Ex: 11°31'36&quot;N 28°41'31&quot;E"
  >

  <button onclick="convert()">Convertir</button>

  <div class="result" id="result"></div>
</div>

<script>
function dmsToDecimal(deg, min, sec, dir) {
  let decimal = Number(deg) + Number(min)/60 + Number(sec)/3600;
  if (dir === 'S' || dir === 'W') decimal *= -1;
  return decimal;
}

function degToRad(deg) {
  return deg * Math.PI / 180;
}

function convert() {
  const input = document.getElementById("coord").value;

  const regex = /(\d+)°(\d+)'(\d+)"([NS])\s+(\d+)°(\d+)'(\d+)"([EW])/;
  const match = input.match(regex);

  if (!match) {
    document.getElementById("result").innerHTML =
      "Format invalide ❌";
    return;
  }

  const latDeg = dmsToDecimal(match[1], match[2], match[3], match[4]);
  const lonDeg = dmsToDecimal(match[5], match[6], match[7], match[8]);

  const latRad = degToRad(latDeg);
  const lonRad = degToRad(lonDeg);

  document.getElementById("result").innerHTML = `
    <strong>Latitude (rad)</strong> : ${latRad}<br>
    <strong>Longitude (rad)</strong> : ${lonRad}
  `;
}
</script>

</body>
</html>
